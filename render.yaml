services:
- type: web
  name: sms-student-management
  runtime: python
  buildCommand: "pip install -r requirements.txt"
  startCommand: "streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true"
  envVars:
    - key: PYTHONUNBUFFERED
      value: "1"
  healthCheckPath: /
  autoDeploy: true
  plan: free
  disk:
    name: disk-01
    mountPath: /app
    sizeGB: 5
