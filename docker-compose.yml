version: '3.8'

services:
  sms-backend:
    build: .
    container_name: sms-backend
    ports:
      - "8001:8001"
    volumes:
      - ./student_management.db:/app/student_management.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  sms-frontend:
    build: .
    container_name: sms-frontend
    ports:
      - "8504:8504"
    volumes:
      - ./student_management.db:/app/student_management.db
    environment:
      - PYTHONUNBUFFERED=1
    command: ["streamlit", "run", "app.py", "--server.address", "0.0.0.0", "--server.port", "8504"]
    depends_on:
      sms-backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sms-data:
    driver: local
